specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: VNC
providerId: vnc
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Remote Access
  - Remote Desktop
  - VNC
  - Developer SDK
  - Subscription
description: RealVNC Connect is sold as a tiered per-seat subscription billed per
  active connection (annual billing), with three published self-service tiers
  (Essentials, Plus, Premium) and a custom-priced Enterprise tier. Higher tiers
  add session recording, granular permissions, audit logs, MFA, on-premises
  deployment, and account-management API access (Plus and above). The VNC Cloud
  REST API and VNC Developer SDK are bundled with the subscription rather than
  metered separately. Exact prices vary by region and active-connection count
  and were not extractable from the live page; refer to the source URL for
  current rates.
sources:
  - https://www.realvnc.com/en/connect/pricing/
  - https://www.realvnc.com/en/developer/
plans:
  - id: vnc-essentials
    name: Essentials
    type: subscription
    description: Entry tier billed annually per active connection. Single user,
      one active connection, up to three managed devices. Includes core remote
      desktop with up to 256-bit AES encryption.
    entries:
      - label: Active Connections
        name: active_connections
        type: quota
        metric: connection
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: true
      - label: Managed Devices
        name: managed_devices
        type: quota
        metric: device
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: false
    elements:
      - name: Up to 256-bit AES Encryption
      - name: Multi-Platform Support (Windows, macOS, Linux, Pi OS)
      - name: Remote Audio
      - name: Remote Printing
      - name: File Transfer
  - id: vnc-plus
    name: Plus
    type: subscription
    description: Mid tier billed annually per active connection. Unlimited users,
      up to three active connections, up to 50 managed devices. Adds session
      recording and account-management API access.
    entries:
      - label: Active Connections
        name: active_connections
        type: quota
        metric: connection
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: true
      - label: Managed Devices
        name: managed_devices
        type: quota
        metric: device
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: false
    elements:
      - name: Everything in Essentials
      - name: Unlimited Users
      - name: Session Recording
      - name: Account Management via API Access
      - name: VNC Cloud REST API
  - id: vnc-premium
    name: Premium
    type: subscription
    description: Higher tier billed annually per active connection. Unlimited
      users, up to five active connections, up to 150 managed devices. Adds
      granular permissions, audit logs, and MFA for sessions.
    entries:
      - label: Active Connections
        name: active_connections
        type: quota
        metric: connection
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: true
      - label: Managed Devices
        name: managed_devices
        type: quota
        metric: device
        limit: 150
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.realvnc.com/en/connect/pricing/
        userMultiplied: false
    elements:
      - name: Everything in Plus
      - name: Granular Permissions
      - name: Audit Logs
      - name: MFA for Sessions
  - id: vnc-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier with unlimited active connections, 150+
      managed devices, on-premises deployment option, and named account
      management.
    entries:
      - label: Active Connections
        name: active_connections
        type: quota
        metric: connection
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Managed Devices
        name: managed_devices
        type: quota
        metric: device
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Everything in Premium
      - name: On-Premises Deployment
      - name: 150+ Managed Devices
      - name: Custom Procurement Terms
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
