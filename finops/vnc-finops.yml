description: FOCUS-aligned FinOps view of RealVNC Connect - tiered per-active-
  connection annual subscription with no usage-based metering. Cost levers are
  tier selection (Essentials / Plus / Premium / Enterprise) and active-connection
  count.
sources:
  - https://www.realvnc.com/en/connect/pricing/
  - https://www.realvnc.com/en/developer/
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: GBP
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
