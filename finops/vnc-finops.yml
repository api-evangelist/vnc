meters:
  - name: active_connection_seats
    description: Active concurrent VNC Connect connections licensed under the
      subscription, billed annually per seat.
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - region
  - name: managed_devices
    description: Devices enrolled into the RealVNC managed estate; capped per
      tier (3 / 50 / 150 / unlimited).
    unit: device
    aggregation: max
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use the RealVNC management console to track active-connection
      utilization vs licensed seats and the device inventory against the tier
      cap; cross-check against the annual RealVNC invoice.
  - name: Allocation
    description: Allocate Connect spend per supported team or product line by
      tagging devices in the management console; chargeback by enrolled-device
      count or by named-user assignment.
  - name: Optimization
    description: Reclaim idle active-connection seats, downgrade tier when
      session-recording / audit-log features are unused, and consolidate
      device enrollments to stay below the next-tier breakpoint.
  - name: Accountability
    description: IT or workplace-services owns the RealVNC contract; per-team
      device counts and seat consumption are reviewed against the licensed
      tier on a quarterly basis.
