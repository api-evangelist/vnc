naftiko: 1.0.0-alpha2
info:
  label: VNC Remote Access Management
  description: Unified capability for managing VNC Cloud remote access infrastructure. Covers provisioning and deprovisioning
    cloud addresses, configuring access control groups, monitoring address readiness, and automating device lifecycle management
    for IT administrators and DevOps teams.
  tags:
  - VNC
  - Remote Access
  - Device Management
  - Cloud
  - IT Operations
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    VNC_CLOUD_API_KEY: VNC_CLOUD_API_KEY
    VNC_CLOUD_API_SECRET: VNC_CLOUD_API_SECRET
capability:
  consumes:
  - type: http
    namespace: vnc-cloud
    baseUri: https://api.vnc.com/cloud/1.1
    description: VNC Cloud REST API for managing cloud addresses.
    authentication:
      type: basic
      username: '{{VNC_CLOUD_API_KEY}}'
      password: '{{VNC_CLOUD_API_SECRET}}'
    resources:
    - name: cloud-addresses
      path: /static-address
      description: Manage static cloud addresses for VNC Cloud connectivity.
      operations:
      - name: create-cloud-address
        method: POST
        description: Create a new static cloud address.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            allowedActions: '{{tools.allowedActions}}'
            groups: '{{tools.groups}}'
      - name: list-cloud-addresses
        method: GET
        description: List all cloud addresses with pagination.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max addresses per page (1-99, default 20).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cloud-address-detail
      path: /static-address/{cloudAddress}
      description: Operate on a specific cloud address.
      operations:
      - name: get-cloud-address
        method: GET
        description: Retrieve details of a specific cloud address.
        inputParameters:
        - name: cloudAddress
          in: path
          type: string
          required: true
          description: The cloud address identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-cloud-address
        method: PUT
        description: Update cloud address groups and access control.
        inputParameters:
        - name: cloudAddress
          in: path
          type: string
          required: true
          description: The cloud address identifier.
        - name: If-Match
          in: header
          type: string
          required: false
          description: ETag for optimistic concurrency.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            allowedActions: '{{tools.allowedActions}}'
            groups: '{{tools.groups}}'
      - name: reset-cloud-address-password
        method: POST
        description: Reset the cloud password for a cloud address.
        inputParameters:
        - name: cloudAddress
          in: path
          type: string
          required: true
          description: The cloud address identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-cloud-address
        method: DELETE
        description: Permanently remove a cloud address.
        inputParameters:
        - name: cloudAddress
          in: path
          type: string
          required: true
          description: The cloud address identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cloud-address-readiness
      path: /static-address/{cloudAddress}/ready
      description: Check whether a cloud address change has propagated.
      operations:
      - name: check-cloud-address-ready
        method: GET
        description: Check readiness status of a cloud address.
        inputParameters:
        - name: cloudAddress
          in: path
          type: string
          required: true
          description: The cloud address identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: vnc-remote-access-api
    description: Unified REST API for VNC remote access infrastructure management.
    resources:
    - path: /v1/cloud-addresses
      name: cloud-addresses
      description: Manage VNC cloud addresses for device connectivity.
      operations:
      - method: POST
        name: create-cloud-address
        description: Provision a new cloud address for a device.
        call: vnc-cloud.create-cloud-address
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-cloud-addresses
        description: List all provisioned cloud addresses.
        call: vnc-cloud.list-cloud-addresses
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cloud-addresses/{cloudAddress}
      name: cloud-address-detail
      description: Inspect and manage a specific cloud address.
      operations:
      - method: GET
        name: get-cloud-address
        description: Retrieve details of a cloud address.
        call: vnc-cloud.get-cloud-address
        with:
          cloudAddress: rest.cloudAddress
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-cloud-address
        description: Update groups and access control for a cloud address.
        call: vnc-cloud.update-cloud-address
        with:
          cloudAddress: rest.cloudAddress
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-cloud-address
        description: Deprovision and remove a cloud address.
        call: vnc-cloud.delete-cloud-address
        with:
          cloudAddress: rest.cloudAddress
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cloud-addresses/{cloudAddress}/password-reset
      name: cloud-address-password
      description: Reset the cloud password for a specific address.
      operations:
      - method: POST
        name: reset-cloud-address-password
        description: Reset the password for a cloud address.
        call: vnc-cloud.reset-cloud-address-password
        with:
          cloudAddress: rest.cloudAddress
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cloud-addresses/{cloudAddress}/ready
      name: cloud-address-readiness
      description: Check propagation status of a cloud address.
      operations:
      - method: GET
        name: check-cloud-address-ready
        description: Verify configuration changes have propagated.
        call: vnc-cloud.check-cloud-address-ready
        with:
          cloudAddress: rest.cloudAddress
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: vnc-remote-access-mcp
    transport: http
    description: MCP server for AI-assisted VNC remote access infrastructure management.
    tools:
    - name: provision-cloud-address
      description: Provision a new VNC cloud address for a device to join VNC Cloud.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vnc-cloud.create-cloud-address
      outputParameters:
      - type: object
        mapping: $.
    - name: list-cloud-addresses
      description: List all cloud addresses provisioned in the VNC account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vnc-cloud.list-cloud-addresses
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: inspect-cloud-address
      description: Retrieve full configuration details for a cloud address.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vnc-cloud.get-cloud-address
      with:
        cloudAddress: tools.cloudAddress
      outputParameters:
      - type: object
        mapping: $.
    - name: reconfigure-cloud-address
      description: Update group membership and access control for a cloud address.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vnc-cloud.update-cloud-address
      with:
        cloudAddress: tools.cloudAddress
      outputParameters:
      - type: object
        mapping: $.
    - name: rotate-cloud-address-password
      description: Generate a new cloud password for a cloud address.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vnc-cloud.reset-cloud-address-password
      with:
        cloudAddress: tools.cloudAddress
      outputParameters:
      - type: object
        mapping: $.
    - name: deprovision-cloud-address
      description: Permanently remove a cloud address from the account.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vnc-cloud.delete-cloud-address
      with:
        cloudAddress: tools.cloudAddress
      outputParameters:
      - type: object
        mapping: $.
    - name: check-address-propagation
      description: Verify whether recent changes to a cloud address have been fully propagated.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vnc-cloud.check-cloud-address-ready
      with:
        cloudAddress: tools.cloudAddress
      outputParameters:
      - type: object
        mapping: $.
