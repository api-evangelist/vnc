specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: VNC
providerId: vnc
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Remote Access
  - Remote Desktop
  - VNC
  - Rate Limiting
description: RealVNC does not publish numeric rate-limit thresholds for the VNC
  Cloud REST API or VNC Developer SDK. Account-management API access is gated
  by subscription tier (Plus and above), and session-level limits are governed
  by per-tier active-connection and managed-device quotas in the plans artifact
  rather than per-second request ceilings. Live RealVNC help center pages
  return 403 to crawlers; specifics must be retrieved authenticated.
sources:
  - https://www.realvnc.com/en/connect/pricing/
  - https://www.realvnc.com/en/developer/
notes: No public per-second / per-minute API rate-limit numbers documented.
  RealVNC's primary "limits" are the per-tier active-connection and managed-device
  quotas captured in the plans artifact. Help center / API reference pages are
  gated and returned 403 during reconciliation.
responseCodes:
  throttled: 429
limits:
  - name: VNC Cloud REST API
    scope: account
    metric: varies
    limit: see RealVNC help center (gated)
    notes: Numeric thresholds not publicly documented; retrieve from authenticated
      help center.
  - name: Active Connection Quota
    scope: subscription
    metric: concurrent_connections
    limit: see plans artifact (1 / 3 / 5 / unlimited per tier)
    notes: Connection concurrency is enforced by subscription tier, not by
      request-rate throttling.
policies:
  - name: Tier-Bound Capacity
    description: The primary enforcement surface is per-tier active connections
      and managed-device count, not per-second request rate. Upgrades are made
      by changing subscription tier.
  - name: Backoff and Retry
    description: Clients of the VNC Cloud REST API should implement exponential
      backoff with jitter on 429 responses.
maintainers:
